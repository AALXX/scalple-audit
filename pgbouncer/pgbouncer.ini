; PgBouncer in TRANSACTION mode — this is the configuration that creates the
; attribution gap. Every client connection is multiplexed onto a small pool of
; backend connections, all authenticating to PostgreSQL as a single role
; (app_user). PostgreSQL never sees the individual human.

[databases]
hospital_demo = host=postgres port=5432 dbname=hospital_demo

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 100
default_pool_size = 20
ignore_startup_parameters = extra_float_digits
admin_users = postgres
